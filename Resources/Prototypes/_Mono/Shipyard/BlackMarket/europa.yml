#Author: Technically Starch under it's old name, mercury, but Articular is one of the more recent contributors.

- type: vessel
  id: Europa
  parent: BaseVesselAntag
  name: AN Europa # LuaM: IDY Europa > AN Europa
  description: A repurposed interdyne medical frigate, with a focus on broadside firepower and armor.
  limit: 3
  price: 280650
  purchasable: false # voucher only
  category: Large
  group: BlackMarket
  access: Pirate
  shuttlePath: /Maps/_LuaM/Shuttles/PDV/europaLuaM.yml # LuaM: /Maps/_Mono/Shuttles/BlackMarket/europa.yml -> /Maps/_LuaM/Shuttles/PDV/europaLuaM.yml
  guidebookPage: Null
  class:
  - Pirate
  - frigate
  engine:
  - AME
  - Uranium # LuaM add

- type: gameMap
  id: Europa
  mapName: 'AN Europa' # LuaM: 'IDY Europa' > AN 'Europa'
  mapPath: /Maps/_LuaM/Shuttles/PDV/europaLuaM.yml # LuaM: /Maps/_Mono/Shuttles/BlackMarket/europa.yml -> /Maps/_LuaM/Shuttles/PDV/europaLuaM.yml
  minPlayers: 0
  stations:
    Europa:
      gridComponents:
      - type: VesselInfo
        description: "The Saturn's Sister ship."
      stationProto: StandardFrontierVessel
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Europa PDV{1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '14'
        - type: StationJobs
          availableJobs:
            Pirate: [ 0, 0 ]
            PdvBorg: [ 0, 0 ]
