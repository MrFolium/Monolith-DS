# Glasses
- type: entity
  id: ClothingEyesPunkGoggles
  parent: [ ClothingEyesGlassesMeson, RecyclableItemClothDevice ]
  name: punk goggles
  description: How can you see anything in this with all the lights?
  components:
  - type: VisionCorrection
  - type: Sprite
    sprite: _NF/Clothing/Eyes/Glasses/punk_glasses.rsi
    layers:
    - state: icon_base_glasses_01 # LuaM base_glasses_01 > icon_base_glasses_01
      map: [ "glasses_main" ]
      # LuaM start:
      # scale: 2.5, 2.5
      # offset: 0,-0.6
      # LuaM end
    - state: icon_decor_base_glasses_01 # LuaM decor_base_glasses_01 > icon_decor_base_glasses_01
      map: [ "glasses_decor" ]
      # LuaM start:
      # scale: 2.5, 2.5
      # offset: 0,-0.6
      # LuaM end
      shader: unshaded
  - type: Clothing
    sprite: _NF/Clothing/Eyes/Glasses/punk_glasses.rsi
    clothingVisuals:
      eyes:
      - state: base_glasses_01
        map: [ "clothing_glasses_main" ] # LuaM glasses_main > clothing_glasses_main
      - state: decor_base_glasses_01
        map: [ "clothing_glasses_decor" ] # LuaM glasses_decor > clothing_glasses_decor
        shader: unshaded
  - type: RandomSprite
  # LuaM start:
    # available:
    #   - glasses_main:
    #       base_glasses_01: CyberpunkDark
    #     glasses_decor:
    #       decor_base_glasses_01: CyberpunkDark
    available:
      - glasses_main:
          icon_base_glasses_01: Base
        clothing_glasses_main:
          base_glasses_01: Base
        glasses_decor:
          icon_decor_base_glasses_01: Decor
        clothing_glasses_decor:
          decor_base_glasses_01: Decor
    mappedColors:
      Base: CyberpunkDark
      Decor: CyberpunkDark
  # LuaM end

# HUDs
- type: entity
  id: ClothingEyesPunkInfoShades
  parent: [ ClothingEyesHudMedical, RecyclableItemClothDevice ]
  name: punk infoshades
  description: How can you see anything in this with all the lights?
  components:
  - type: VisionCorrection
  # LuaM start:
  # - type: Item
  #   shape:
  #   - 0,0,1,0
  #   storedOffset: -20,-20
  # LuaM end
  - type: Sprite
    sprite: _NF/Clothing/Eyes/Glasses/punk_glasses.rsi
    layers:
    - state: icon_base_glasses_02 # LuaM base_glasses_02 > icon_base_glasses_02
      map: [ "infoshades_main" ]
      # scale: 2.5, 2.5
      # offset: 0,-0.6
    - state: icon_decor_base_glasses_02 # LuaM decor_base_glasses_02 > icon_decor_base_glasses_02
      map: [ "infoshades_decor" ]
      # scale: 2.5, 2.5
      # offset: 0,-0.6
      shader: unshaded
  - type: Clothing
    sprite: _NF/Clothing/Eyes/Glasses/punk_glasses.rsi
    clothingVisuals:
      eyes:
      - state: base_glasses_02
        map: [ "clothing_infoshades_main" ] # LuaM infoshades_main > clothing_infoshades_main
      - state: decor_base_glasses_02
        map: [ "clothing_infoshades_decor" ] # LuaM infoshades_decor > clothing_infoshades_decor
        shader: unshaded
  # LuaM start:
  # - type: RandomSprite
  #   available:
  #     - infoshades_main:
  #         base_glasses_02: CyberpunkNeon
  #       infoshades_decor:
  #         decor_base_glasses_02: CyberpunkNeon
  - type: RandomSprite
    available:
      - infoshades_main:
          icon_base_glasses_02: Base
        clothing_infoshades_main:
          base_glasses_02: Base
        infoshades_decor:
          icon_decor_base_glasses_02: Decor
        clothing_infoshades_decor:
          decor_base_glasses_02: Decor
    mappedColors:
      Base: CyberpunkNeon
      Decor: CyberpunkNeon
  # LuaM end    
  - type: ShowHealthBars
    damageContainers:
    - Inorganic
    - Silicon
    - Biological
