- proto: Paper
  entities:
  - uid: 905
    components:
    - type: Transform
      pos: 7.520886,6.620877
      parent: 1
    - type: Paper
      content: >2-


        [head=1][mono][color=#d2b48c]Fenrir Technical Manual[/color][/mono][/head]


        > [mono]Fenrir is a medium sized destroyer armed with a [bold][color=#990000]M381 Charon Mass Driver[/bold][/color], [bold][color=#0055CC]4 ADBP-7 Dravon autocannons[/bold][/color] and [bold][color=#0055CC]2 Adder scattercannons[/bold][/color]. It has been outfitted with [color=#0055CC][bold]two medium sized[/color] [color=#00CC55]mech bays[/bold][/color]. Unmodified models can support at best [bold][color=#00CC55]S-2 size classed mechs[/bold][/color].[/mono]


        > [mono][color=#992222][bold]Important[/color][/bold]; [bold][color=#990000]M381 Charon Mass Driver[/bold][/color], can not fire until the blast doors are open, controls are linked to your [color=#00CC55][bold]shuttle console port buttons[/color][/bold]. [color=#00CC55][bold]Port 1 opens[/color][/bold] the blast doors, [color=#00CC55][bold] Port 2 closes[/color][/bold] the blast doors.


        > [mono]You have been supplied with [color=#00CC55][bold]5[/color][/bold] 280mm 26.5kg slugs for your [bold][color=#990000]M381 Mass Driver[/bold][/color].


        > [mono]Mech bays are [bold][color=#992222]empty[/bold][/color], as it is [bold][color=#00CC55]your responsibility to refit them[/bold][/color] in accordance to your strategy.


        > [mono]Mech bays blast doors can be toggled on and off using the [bold][color=#00CC55]two buttons placed next to[/bold][/color] your shuttle control terminals.


        > [mono][bold][color=#00CC55]Workshop area[/bold][/color] has been supplied with adequate amount of [bold][color=#FFA500]welding fuel[/color][/bold] and [bold][color=#0055CC]nanite fuel[/color][/bold] to perform repairs on mechs and inorganic crew.


        > [mono]Both [bold][color=#992222]armory[/color][/bold] and [color=#90D6FF][bold]medbay[/color][/bold] have been adequately equipped with [bold][color=#00CC55]hardsuits[/bold][/color], [bold][color=#00CC55]weapons[/color][/bold] and [bold][color=#00CC55]medicine[/color][/bold].


        > [mono][bold][color=#00CC55]Fabricator area[/bold][/color] has been outfitted with a [bold][color=#00CC55]material locker[/color][/bold] holding necessary materials to print any item, of need however it is not equipped to perform any extensive printing. The [bold][color=#992222]armory[/color][/bold] has also been outfitted with an [bold][color=#00CC55]ammo techfab[/bold][/color].
