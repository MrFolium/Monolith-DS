# Tier 2

- type: entity
  parent: BaseShipLPC
  id: ShipVoucherArrow
  name: TSF Arrow LPC [T2]
  description: a voucher that allows you to feel like a little bit of a flyssa pilot
  components:
  - type: Sprite
    sprite: _Mono/Objects/Misc/lpcnew.rsi
    layers:
    - state: icon_capital
    - state: screen
      color: "#05ffff"
    - state: screen1
      color: "#05ffff"
      shader: unshaded
  - type: ShipyardVoucher
    destroyOnEmpty: false
    cooldown: 7200 # one hour
    consoleType: Security
    companyName: TSF
    vessels:
    - TSFMCArrow
  - type: StaticPrice
    vendPrice: 600000

