
- type: entity
  id: ClothingShoesBootsPunkRandomized
  parent: [ ClothingShoesMilitaryBase, RecyclableItemClothSmall ]
  name: punk boots
  description: Deez boots were made for stompin', an' stompin' on ya bucket dey'll do.
  suffix: Random visuals
  components:
  - type: Sprite
    sprite: _NF/Clothing/Shoes/Boots/punk.rsi
    layers:
    - state: icon_base_boots_01 # LuaM base_boots_01 > icon_base_boots_01
      map: [ "boots_main" ]
      # LuaM start:
      # scale: 2, 2
      # offset: 0,0.6
      # LuaM end
    - state: icon_decor_base_boots_01 # LuaM decor_base_boots_01 > icon_decor_base_boots_01
      map: [ "boots_decor" ]
    # LuaM start:
    #   scale: 2, 2
    #   offset: 0,0.6
    # - state: mask_null
    #   map: [ "boots_overlay" ]
    #   scale: 2, 2
    #   offset: 0,0.6
    # LuaM end
  - type: Clothing
    sprite: _NF/Clothing/Shoes/Boots/punk.rsi
    clothingVisuals:
      shoes:
      - state: base_boots_01
        map: [ "clothing_boots_main" ]
      - state: mask_null
        map: [ "clothing_boots_decor" ]
      - state: mask_null
        map: [ "clothing_boots_overlay" ]
  - type: RandomSprite
  # LuaM start:
  #   available:
  #   - boots_main:
  #       base_boots_01: Cyberpunk
  #     boots_decor:
  #       decor_base_boots_01: Cyberpunk
  #       mask_null: ""
  #     boots_overlay:
  #       decor_base_boots_02: Cyberpunk
  #       mask_null: "
    available:
    - boots_main: &bootsMain
        icon_base_boots_01: Base
      clothing_boots_main: &clothingBootsMain
        base_boots_01: Base
      boots_decor:
        icon_decor_base_boots_01: Decor
      clothing_boots_decor:
        decor_base_boots_01: Decor
      clothing_boots_overlay: &bootsOverlay
        decor_base_boots_02: Cyberpunk
        mask_null: ""
    - boots_main: *bootsMain
      clothing_boots_main: *clothingBootsMain
      boots_decor:
        mask_null: ""
      clothing_boots_decor:
        mask_null: ""
      clothing_boots_overlay: *bootsOverlay
    mappedColors:
      Base: Cyberpunk
      Decor: Cyberpunk
  # LuaM end